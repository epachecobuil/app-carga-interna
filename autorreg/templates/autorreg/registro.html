{% extends 'autorreg/base.html' %}

{% block contenido %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-sm border border-slate-200 p-8 mt-10">
    <h2 class="text-2xl font-bold text-slate-800 text-center mb-6">Crear Cuenta</h2>
    
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        
        <div class="space-y-4 [&>p>label]:block [&>p>label]:text-sm [&>p>label]:font-bold [&>p>label]:text-slate-700 [&>p>input]:w-full [&>p>input]:mt-1 [&>p>input]:rounded-md [&>p>input]:border-slate-300 [&>p>input]:p-2 [&>p>input]:border [&>p>input]:bg-slate-50 [&>ul]:text-xs [&>ul]:text-red-500 [&>span]:text-xs [&>span]:text-slate-500">
            {{ formulario.as_p }}
        </div>

        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg mt-6">
            Registrarme y Entrar
        </button>
    </form>
    
    <p class="text-center text-sm text-slate-500 mt-6">
        ¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-blue-600 font-semibold hover:underline">Inicia sesión</a>
    </p>
</div>
{% endblock %}

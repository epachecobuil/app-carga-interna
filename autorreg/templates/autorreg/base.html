<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <nav class="bg-slate-900 text-white shadow-lg">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="{% url 'hub' %}" class="text-xl font-bold tracking-wider uppercase hover:text-blue-400 transition-colors">Training Hub</a>
            <div class="text-sm font-medium flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <span class="text-slate-300">Hola, <span class="font-bold text-white">{{ user.username }}</span></span>
                    
                    <form method="post" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="bg-slate-700 hover:bg-red-600 px-3 py-1 rounded transition-colors">Salir</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-slate-300 hover:text-white">Entrar</a>
                    <a href="{% url 'registro' %}" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded transition-colors">Registro</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="p-4 rounded-lg flex items-center shadow-sm text-sm font-medium
                        {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
                        {% elif message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
                        {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
                        
                        <svg class="w-5 h-5 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block contenido %}
        {% endblock %}
    </main>

</body>
</html>
